# ── Instance ──
instance:
  id: "node-1"
  producer_version: "1.0"

# ── Pipeline Orchestration ──
pipelines:
  enabled_frequencies: ["second", "minute"]

# ── Per-Frequency Config ──
frequency_config:
  second:
    buffer_size: 10000
    batch_size: 100
    flush_interval_ms: 100
    sigma: 0.05
    anamoly_probablity: 0.002
    anomaly_magnitude: 2.0
    drift_rate: 0.001
    dispatcher:
      max_retries: 5
      base_backoff: 100
      max_backoff: 1000
  minute:
    buffer_size: 1000
    batch_size: 50
    flush_interval_ms: 500
    sigma: 0.05
    anamoly_probablity: 0.002
    anomaly_magnitude: 2.0
    drift_rate: 0.001
    dispatcher:
      max_retries: 10
      base_backoff: 500
      max_backoff: 5000
  hour:
    buffer_size: 100
    batch_size: 10
    flush_interval_ms: 1000
    sigma: 0.05
    anamoly_probablity: 0.002
    anomaly_magnitude: 2.0
    drift_rate: 0.001
    dispatcher:
      max_retries: 15
      base_backoff: 1000
      max_backoff: 30000
  day:
    buffer_size: 10
    batch_size: 5
    flush_interval_ms: 5000
    sigma: 0.05
    anamoly_probablity: 0.002
    anomaly_magnitude: 2.0
    drift_rate: 0.001
    dispatcher:
      max_retries: 20
      base_backoff: 5000
      max_backoff: 60000

# ── User Simulation ──
users:
  count: 5
  seed: 42

# ── DLQ ──
dlq:
  enabled: true
  directory: "/Users/anshumanmandal/GIT/chronostream/dlq"

# ── Kinesis ──
kinesis:
  enabled: true
  stream_name: "chronostream-events"
  region: "ap-south-1"
